<!DOCTYPE html>
<html lang="id">
<head>
<title>Toko Online</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-danger">
  <div class="container">
    <a class="navbar-brand" href="#">TokoKu</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#produk">Produk</a></li>
        <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="bg-warning p-5 text-center">
  <h1>Selamat Datang di toko olahraga</h1>
  <p>Toko online sederhana untuk ujian praktik</p>
</div>

<section id="produk" class="container py-5">
  <h2 class="text-center mb-4">Produk</h2>

  <div class="row">

    <div class="col-md-3">
      <div class="card">
        <img src="septu futsal 3.jpg" class="card-img-top" alt="Sepatu Futsal">
        <div class="card-body text-center">
          <h5>Sepatu</h5>
          <p>Rp 599.000</p>
          <button class="btn btn-danger">Beli</button>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card">
        <img src="sepatu running 1.jpg" class="card-img-top" alt="Sepatu Running">
        <div class="card-body text-center">
          <h5>sepatu running</h5>
          <p>Rp 1.999.000</p>
          <button class="btn btn-danger">Beli</button>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card">
        <img src="sepatu futsal.jpg" class="card-img-top" alt="Sepatu Futsal">
        <div class="card-body text-center">
          <h5>sepatu futsal</h5>
          <p>Rp 599.000</p>
          <button class="btn btn-danger">Beli</button>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card">
        <img src="sepatu running 2.jpg" class="card-img-top" alt="Sepatu Running">
        <div class="card-body text-center">
          <h5>sepatu running</h5>
          <p>Rp 999.000</p>
          <button class="btn btn-danger">Beli</button>
        </div>
      </div>
    </div>

  </div>
</section>

<section id="contact" class="bg-light py-5">
  <div class="container">
    <h2 class="text-center mb-4">Contact</h2>

    <div class="row justify-content-center">
<div class="col-md-6">
    <form action="#" method="POST"></form>

      <div class="mb-3">
            <label class="form-label">Nama</label>
            <input type="text" class="form-control" name="nama" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Pesan</label>
            <textarea class="form-control" name="pesan" rows="5" required></textarea>
          </div>

          <button type="submit" class="btn btn-danger">Kirim</button>

        </form>
      </div>
    </div>
  </div>
</section>

<footer class="bg-dark text-primary text-center p-3">
  <p>Website Ujian Praktik</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
